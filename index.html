    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-primary: #0f1115; --text-primary: #e2e8f0; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-primary); color: var(--text-primary); margin: 0; -webkit-font-smoothing: antialiased; transition: background-color 0.3s ease, color 0.3s ease; }
        body.light { --bg-primary: #f1f5f9; --text-primary: #1e293b; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }

        /* Modal animations */
        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.95) translateY(8px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }
        @keyframes overlayIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }
        .modal-overlay { animation: overlayIn 0.2s ease; }
        .modal-content { animation: modalIn 0.25s cubic-bezier(0.16, 1, 0.3, 1); }

        /* Hover reveal on StaffCard */
        .staff-card-actions { opacity: 0; transition: opacity 0.2s ease; }
        .group:hover .staff-card-actions { opacity: 1; }

        /* Input styling */
        .gc-input {
            background: #1a1f26;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
            padding: 8px 12px;
            color: #e2e8f0;
            font-size: 12px;
            width: 100%;
            outline: none;
            transition: border-color 0.2s;
            font-family: 'Inter', sans-serif;
        }
        .gc-input:focus { border-color: rgba(59,130,246,0.5); box-shadow: 0 0 0 3px rgba(59,130,246,0.08); }
        body.light .gc-input { background: #fff; border-color: #e2e8f0; color: #1e293b; }
        body.light .gc-input:focus { border-color: rgba(59,130,246,0.5); }

        select.gc-input option { background: #1a1f26; }
        body.light select.gc-input option { background: #fff; }

        /* Toast */
        @keyframes toastIn {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes toastOut {
            from { opacity: 1; transform: translateY(0); }
            to   { opacity: 0; transform: translateY(12px); }
        }
        .toast { animation: toastIn 0.3s ease; }
        .toast.hiding { animation: toastOut 0.3s ease forwards; }
    </style>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@19?dev",
        "react-dom": "https://esm.sh/react-dom@19?dev",
        "react-dom/client": "https://esm.sh/react-dom@19/client?dev"
      }
    }
    </script>
</head>

    return parts[0][0] + parts[parts.length-1][0];

// ---------- SUB-COMPONENTS ----------

const DateBadge = ({ date, variant='entry' }) => {
    const styles = {
        entry:   'bg-emerald-500/10 text-emerald-400 border-emerald-500/20',
        exit:    'bg-rose-500/10 text-rose-400 border-rose-500/20',

    }, date);
};

const SectionHeader = ({ title, variant='primary' }) => {

        primary: 'border-l-4 border-blue-500 bg-gradient-to-r from-blue-50 dark:from-slate-800/80 to-transparent',
        archive: 'border-l-4 border-slate-400 dark:border-gray-500 bg-gradient-to-r from-slate-100 dark:from-gray-800/80 to-transparent',

};

        }, member.initials),

                React.createElement(DateBadge, { date: member.exitDate, variant:'exit' })

// ---------- MODAL ADD ----------
const ModalAdd = ({ onClose, onAdd }) => {
    const [form, setForm] = useState({ name:'', department: DEPARTMENTS[0], role:'', entryDate: today() });
    const [error, setError] = useState('');
    const availableRoles = ROLES_BY_DEPT[form.department] || [];

    const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

    const handleDeptChange = v => {
        const roles = ROLES_BY_DEPT[v] || [];
        setForm(f => ({ ...f, department: v, role: roles[0] || '' }));
    };

    const handleSubmit = () => {
        if (!form.name.trim()) { setError("Le nom est obligatoire."); return; }
        if (!form.role.trim()) { setError("Le rôle est obligatoire."); return; }
        if (!form.entryDate)   { setError("La date d'entrée est obligatoire."); return; }
        const newMember = {
            id: 'u_' + Date.now(),
            name: form.name.trim().toUpperCase(),
            department: form.department,
            role: form.role.trim(),
            entryDate: form.entryDate,
            initials: genInitials(form.name)
        };
        onAdd(newMember);
        onClose();
    };

    const labelCls = "block text-[9px] font-black uppercase tracking-widest text-slate-400 dark:text-slate-500 mb-1.5";

    return React.createElement('div', {
        className: "modal-overlay fixed inset-0 z-50 flex items-center justify-center p-4",
        style: { background: 'rgba(0,0,0,0.65)', backdropFilter: 'blur(4px)' },
        onClick: e => { if(e.target === e.currentTarget) onClose(); }
    },
        React.createElement('div', {
            className: "modal-content bg-white dark:bg-[#161b23] border border-slate-200 dark:border-white/8 rounded-2xl w-full max-w-md shadow-2xl"
        }, [
            // Header
            React.createElement('div', { key:'hd', className:"flex items-center justify-between px-6 pt-5 pb-4 border-b border-slate-100 dark:border-white/5" }, [
                React.createElement('div', { key:'ttl' }, [
                    React.createElement('h2', { className:"text-sm font-black text-slate-900 dark:text-white uppercase tracking-tight" }, "Nouveau collaborateur"),
                    React.createElement('p',  { className:"text-[9px] text-slate-400 mt-0.5" }, "Ajouter au registre actif")
                ]),
                React.createElement('button', {
                    key:'cls', onClick: onClose,
                    className:"w-8 h-8 rounded-full bg-slate-100 dark:bg-white/5 hover:bg-slate-200 dark:hover:bg-white/10 flex items-center justify-center text-slate-400 transition-colors"
                }, React.createElement('i', { className:"fa-solid fa-xmark text-xs" }))
            ]),

            // Form
            React.createElement('div', { key:'form', className:"px-6 py-5 space-y-4" }, [
                // Nom complet
                React.createElement('div', { key:'f-name' }, [
                    React.createElement('label', { className: labelCls }, "Nom & Prénom"),
                    React.createElement('input', {
                        type:'text', className:'gc-input', placeholder:"EX: ALAMI Mohammed",
                        value: form.name,
                        onChange: e => set('name', e.target.value)
                    })
                ]),
                // Département + Rôle côte à côte
                React.createElement('div', { key:'f-dept-role', className:"grid grid-cols-2 gap-3" }, [
                    React.createElement('div', { key:'dept' }, [
                        React.createElement('label', { className: labelCls }, "Département"),
                        React.createElement('select', {
                            className:'gc-input', value: form.department,
                            onChange: e => handleDeptChange(e.target.value)
                        }, DEPARTMENTS.map(d => React.createElement('option', { key:d, value:d }, d)))
                    ]),
                    React.createElement('div', { key:'role' }, [
                        React.createElement('label', { className: labelCls }, "Rôle / Fonction"),
                        React.createElement('select', {
                            className:'gc-input', value: form.role,
                            onChange: e => set('role', e.target.value)
                        }, availableRoles.map(r => React.createElement('option', { key:r, value:r }, r)))
                    ])
                ]),
                // Date d'entrée
                React.createElement('div', { key:'f-date' }, [
                    React.createElement('label', { className: labelCls }, "Date d'entrée"),
                    React.createElement('input', {
                        type:'date', className:'gc-input', value: form.entryDate,
                        onChange: e => set('entryDate', e.target.value)
                    })
                ]),
                // Error
                error && React.createElement('p', { key:'err', className:"text-[10px] text-rose-400 font-medium flex items-center gap-1.5" }, [
                    React.createElement('i', { className:"fa-solid fa-triangle-exclamation" }),
                    error
                ])
            ]),

            // Footer
            React.createElement('div', { key:'ft', className:"px-6 pb-5 flex gap-3 justify-end" }, [
                React.createElement('button', {
                    key:'cancel', onClick: onClose,
                    className:"px-4 py-2 text-xs font-bold text-slate-500 dark:text-slate-400 hover:text-slate-800 dark:hover:text-white transition-colors rounded-lg hover:bg-slate-100 dark:hover:bg-white/5"
                }, "Annuler"),
                React.createElement('button', {
                    key:'save', onClick: handleSubmit,
                    className:"px-5 py-2 bg-blue-600 hover:bg-blue-500 text-white text-xs font-black rounded-lg transition-colors flex items-center gap-2"
                }, [
                    React.createElement('i', { key:'ic', className:"fa-solid fa-user-plus text-[10px]" }),
                    "Ajouter"
                ])

        ])
    );
};

// ---------- MODAL ARCHIVE ----------
const ModalArchive = ({ member, onClose, onConfirm }) => {
    const [exitDate, setExitDate] = useState(today());
    const [error, setError] = useState('');

    const handleConfirm = () => {
        if (!exitDate) { setError("La date de sortie est obligatoire."); return; }
        if (exitDate < member.entryDate) { setError("La date de sortie doit être après la date d'entrée."); return; }
        onConfirm(member, exitDate);
        onClose();
    };

    return React.createElement('div', {
        className: "modal-overlay fixed inset-0 z-50 flex items-center justify-center p-4",
        style: { background:'rgba(0,0,0,0.65)', backdropFilter:'blur(4px)' },
        onClick: e => { if(e.target===e.currentTarget) onClose(); }
    },
        React.createElement('div', {
            className:"modal-content bg-white dark:bg-[#161b23] border border-slate-200 dark:border-white/8 rounded-2xl w-full max-w-sm shadow-2xl"
        }, [
            // Header rose
            React.createElement('div', { key:'hd', className:"flex items-center gap-3 px-6 pt-5 pb-4 border-b border-slate-100 dark:border-white/5" }, [
                React.createElement('div', { key:'ico', className:"w-9 h-9 rounded-xl bg-rose-500/10 border border-rose-500/20 flex items-center justify-center" },
                    React.createElement('i', { className:"fa-solid fa-box-archive text-rose-400 text-sm" })
                ),
                React.createElement('div', { key:'txt' }, [
                    React.createElement('h2', { className:"text-sm font-black text-slate-900 dark:text-white uppercase tracking-tight" }, "Archiver"),
                    React.createElement('p',  { className:"text-[9px] text-slate-400 mt-0.5 truncate max-w-[220px]" }, member.name)
                ])
            ]),

            // Body
            React.createElement('div', { key:'body', className:"px-6 py-5 space-y-4" }, [
                React.createElement('p', { key:'info', className:"text-[10px] text-slate-400 leading-relaxed" },
                    "Ce collaborateur sera retiré de l'effectif actif et déplacé dans les archives."
                ),
                React.createElement('div', { key:'date' }, [
                    React.createElement('label', { className:"block text-[9px] font-black uppercase tracking-widest text-slate-400 mb-1.5" }, "Date de sortie"),
                    React.createElement('input', {
                        type:'date', className:'gc-input', value: exitDate,
                        onChange: e => { setExitDate(e.target.value); setError(''); }
                    })
                ]),
                error && React.createElement('p', { key:'err', className:"text-[10px] text-rose-400 font-medium flex items-center gap-1.5" }, [
                    React.createElement('i', { className:"fa-solid fa-triangle-exclamation" }),
                    error
                ])
            ]),

            // Footer
            React.createElement('div', { key:'ft', className:"px-6 pb-5 flex gap-3 justify-end" }, [
                React.createElement('button', {
                    key:'cancel', onClick: onClose,
                    className:"px-4 py-2 text-xs font-bold text-slate-500 dark:text-slate-400 hover:text-slate-800 dark:hover:text-white transition-colors rounded-lg hover:bg-slate-100 dark:hover:bg-white/5"
                }, "Annuler"),
                React.createElement('button', {
                    key:'confirm', onClick: handleConfirm,
                    className:"px-5 py-2 bg-rose-600 hover:bg-rose-500 text-white text-xs font-black rounded-lg transition-colors flex items-center gap-2"
                }, [
                    React.createElement('i', { key:'ic', className:"fa-solid fa-box-archive text-[10px]" }),
                    "Confirmer la sortie"
                ])
            ])
        ])
    );
};

// ---------- TOAST ----------
const Toast = ({ msg, type }) => {
    const colors = { success:'bg-emerald-600', info:'bg-blue-600', error:'bg-rose-600' };
    const icons  = { success:'fa-check-circle', info:'fa-circle-info', error:'fa-triangle-exclamation' };
    return React.createElement('div', {
        className: `toast fixed bottom-6 left-1/2 -translate-x-1/2 z-[100] flex items-center gap-3 ${colors[type]} text-white text-xs font-bold px-5 py-3 rounded-full shadow-2xl`
    }, [
        React.createElement('i', { key:'ic', className:`fa-solid ${icons[type]} text-[11px]` }),
        React.createElement('span', { key:'txt' }, msg)
    ]);
};

// ---------- APP ----------
const App = () => {
    const [activeStaff,   setActiveStaff]   = useState(INITIAL_ACTIVE);
    const [archivedStaff, setArchivedStaff] = useState(INITIAL_ARCHIVED);
    const [search, setSearch]   = useState('');
    const [theme,  setTheme]    = useState('dark');
    const [showAdd,     setShowAdd]     = useState(false);
    const [archiveMember, setArchiveMember] = useState(null); // member to archive
    const [toast, setToast] = useState(null);

    useEffect(() => { document.body.className = theme; }, [theme]);

    const showToast = (msg, type='success') => {
        setToast({ msg, type });
        setTimeout(() => setToast(null), 3000);
    };

    // Add new member
    const handleAdd = (member) => {
        setActiveStaff(prev => [...prev, member]);
        showToast(`${member.name} ajouté avec succès.`, 'success');
    };

    // Archive member
    const handleArchiveConfirm = (member, exitDate) => {
        const archived = {
            id: 'arch_' + member.id + '_' + Date.now(),
            name: member.name,
            entryDate: member.entryDate,
            exitDate: exitDate,
            role: member.role || "Ancien Collaborateur"
        };
        setActiveStaff(prev => prev.filter(m => m.id !== member.id));
        setArchivedStaff(prev => [archived, ...prev]);
        showToast(`${member.name} archivé.`, 'info');
    };

    const filteredStaff = useMemo(() => {
        if (!search) return activeStaff;
        const s = search.toLowerCase();
        return activeStaff.filter(m => m.name.toLowerCase().includes(s) || m.role.toLowerCase().includes(s) || m.department.toLowerCase().includes(s));
    }, [search, activeStaff]);

    const filteredArchive = useMemo(() => {
        if (!search) return archivedStaff;
        const s = search.toLowerCase();
        return archivedStaff.filter(m => m.name.toLowerCase().includes(s));
    }, [search, archivedStaff]);

    const downloadPDF = () => {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('p','mm','a4');
        const todayStr = new Date().toLocaleDateString('fr-FR');
        doc.setFillColor(245,245,245); doc.rect(0,0,210,40,'F');
        doc.setFontSize(22); doc.setFont('helvetica','bold'); doc.setTextColor(33,37,41);
        doc.text("REGISTRE UNIQUE DU PERSONNEL",15,20);
        doc.setFontSize(10); doc.setFont('helvetica','normal'); doc.setTextColor(100,100,100);
        doc.text("Société : Grey Corner",15,28);
        doc.text("Date d'édition : " + todayStr,15,33);
        doc.setFontSize(14); doc.setFont('helvetica','bold'); doc.setTextColor(59,130,246);
        doc.text("I. EFFECTIF ACTIF",15,52);
        doc.autoTable({
            startY:58, head:[['NOM & PRÉNOM','FONCTION','DÉPARTEMENT',"DATE D'ENTRÉE"]],
            body: activeStaff.map(m=>[m.name,m.role,m.department,m.entryDate]),
            theme:'striped',
            headStyles:{fillColor:[59,130,246],fontSize:9,halign:'center',fontStyle:'bold'},
            bodyStyles:{fontSize:8,textColor:[50,50,50]},
            alternateRowStyles:{fillColor:[249,250,251]},
            columnStyles:{0:{fontStyle:'bold',cellWidth:60},1:{cellWidth:45},2:{cellWidth:40},3:{halign:'center'}},
            margin:{left:15,right:15}
        });
        const finalY = doc.lastAutoTable.finalY+15;
        const sy = finalY>240 ? (doc.addPage(), 20) : finalY;
        doc.setFontSize(14); doc.setFont('helvetica','bold'); doc.setTextColor(107,114,128);
        doc.text("II. PERSONNEL SORTI (ARCHIVES)",15,sy);
        doc.autoTable({
            startY: sy+6, head:[["NOM & PRÉNOM","DATE D'ENTRÉE","DATE DE SORTIE","STATUT"]],
            body: archivedStaff.map(m=>[m.name,m.entryDate,m.exitDate,"Sorti"]),
            theme:'grid',
            headStyles:{fillColor:[107,114,128],fontSize:9,halign:'center',fontStyle:'bold'},
            bodyStyles:{fontSize:8,textColor:[100,100,100]},
            columnStyles:{0:{fontStyle:'bold',cellWidth:70},1:{halign:'center'},2:{halign:'center'},3:{halign:'center'}},
            margin:{left:15,right:15}
        });
        const pc = doc.internal.getNumberOfPages();
        for(let i=1;i<=pc;i++){doc.setPage(i);doc.setFontSize(8);doc.setTextColor(150,150,150);doc.text(`Page ${i} sur ${pc}`,195,285,{align:'right'});}
        doc.save(`Registre_Personnel_GreyCorner_${new Date().toISOString().split('T')[0]}.pdf`);
    };

    return React.createElement(React.Fragment, null, [
        // App container
        React.createElement('div', { key:'app', className:"max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 min-h-screen transition-colors duration-300" }, [

            // HEADER
            React.createElement('header', { key:'hdr', className:"mb-10 flex flex-col sm:flex-row justify-between items-start gap-6" }, [
                React.createElement('div', { key:'title-section', className:"flex flex-col" }, [
                    React.createElement('div', { className:"flex items-center gap-3" }, [
                        React.createElement('h1', { className:"text-4xl font-black tracking-tighter text-slate-900 dark:text-white uppercase leading-none" }, [
                            "Staff Hub ", React.createElement('span', { className:"text-blue-500" }, ".")
                        ]),
                        React.createElement('div', { className:"flex gap-2" }, [
                            React.createElement('button', { key:'theme', onClick:()=>setTheme(p=>p==='dark'?'light':'dark'),
                                className:"p-2 rounded-full bg-slate-200 dark:bg-slate-800 hover:bg-slate-300 dark:hover:bg-slate-700 transition-colors text-slate-600 dark:text-slate-300",
                                title:"Changer de thème"
                            }, React.createElement('i', { className:`fa-solid ${theme==='dark'?'fa-sun':'fa-moon'} text-sm` })),
                            React.createElement('button', { key:'pdf', onClick:downloadPDF,
                                className:"p-2 rounded-full bg-slate-200 dark:bg-slate-800 hover:bg-blue-500 dark:hover:bg-blue-600 transition-colors text-slate-600 dark:text-slate-300 hover:text-white",
                                title:"Exporter en PDF"
                            }, React.createElement('i', { className:"fa-solid fa-file-pdf text-sm" }))
                        ])
                    ]),
                    React.createElement('p', { className:"text-blue-600 dark:text-blue-400 text-[10px] font-bold uppercase tracking-[0.2em] mt-3 flex items-center gap-2" }, [
                        React.createElement('span', { className:"w-2 h-2 rounded-full bg-blue-500 animate-pulse" }),
                        "Gestion du Personnel • Grey Corner"
                    ])
                ]),
                React.createElement('div', { key:'controls', className:"flex items-center gap-4 w-full sm:w-auto" }, [
                    // Search
                    React.createElement('div', { className:"relative flex-grow sm:flex-grow-0 group" }, [
                        React.createElement('i', { className:"fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 dark:text-slate-500 text-xs transition-colors group-focus-within:text-blue-500" }),
                        React.createElement('input', {
                            type:"text", placeholder:"Rechercher...", value:search,
                            onChange: e=>setSearch(e.target.value),
                            className:"bg-white dark:bg-[#1a1f26] border border-slate-200 dark:border-white/10 rounded-full py-2.5 pl-10 pr-4 text-xs text-slate-800 dark:text-slate-200 focus:outline-none focus:border-blue-500/50 w-full sm:w-64 transition-all focus:shadow-[0_0_20px_rgba(59,130,246,0.1)] shadow-sm"
                        })
                    ]),
                    // Add button
                    React.createElement('button', {
                        key:'add-btn', onClick:()=>setShowAdd(true),
                        className:"flex items-center gap-2 px-4 py-2.5 bg-blue-600 hover:bg-blue-500 text-white text-[10px] font-black rounded-full transition-colors shadow-lg shadow-blue-500/20 whitespace-nowrap"
                    }, [
                        React.createElement('i', { key:'ic', className:"fa-solid fa-user-plus text-[10px]" }),
                        React.createElement('span', { key:'tx' }, "Ajouter")
                    ]),
                    // Counter
                    React.createElement('div', { className:"text-right hidden xs:block" }, [
                        React.createElement('div', { className:"text-3xl font-black text-slate-900 dark:text-white leading-none font-mono" }, filteredStaff.length),
                        React.createElement('div', { className:"text-[9px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest mt-1" }, "Effectif Actif")
                    ])
                ])
            ]),

            // MAIN
            React.createElement('main', { key:'main', className:"space-y-12 pb-24" }, [
                React.createElement('div', { key:'active', className:"space-y-10" }, [
                    ...DEPARTMENTS.map(dept => {
                        const members = filteredStaff.filter(m => m.department === dept);
                        if (!members.length) return null;
                        return React.createElement('section', { key:dept }, [
                            React.createElement(SectionHeader, { title:dept }),
                            React.createElement('div', { className:"grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4" },
                                members.map(m => React.createElement(StaffCard, { key:m.id, member:m, onArchive:setArchiveMember }))
                            )
                        ]);
                    }),
                    filteredStaff.length===0 && React.createElement('div', { key:'empty', className:"py-20 text-center" }, [
                        React.createElement('i', { className:"fa-solid fa-user-slash text-4xl text-slate-300 dark:text-slate-800 mb-4" }),
                        React.createElement('p',  { className:"text-slate-400 dark:text-slate-500 text-sm font-medium" }, `Aucun collaborateur trouvé pour "${search}"`)
                    ])
                ]),
                filteredArchive.length > 0
                    ? React.createElement('section', { key:'arch', className:"mt-20 pt-10 border-t border-slate-200 dark:border-white/5" }, [
                        React.createElement(SectionHeader, { key:'sh', title:`Archives (Sorties) — ${filteredArchive.length}`, variant:"archive" }),
                        React.createElement('div', { key:'grid', className:"grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4" },
                            filteredArchive.map(m => React.createElement(ArchiveCard, { key: m.id, member: m }))
                        )
                      ])
                    : null
            ])
        ]),

        // FAB mobile
        React.createElement('button', {
            key:'fab', onClick:()=>setShowAdd(true),
            className:"fixed bottom-6 right-6 bg-blue-600 hover:bg-blue-500 text-white w-14 h-14 rounded-full shadow-2xl shadow-blue-500/30 flex items-center justify-center transition-colors sm:hidden border-4 border-slate-100 dark:border-[#0f1115]"
        }, React.createElement('i', { className:"fa-solid fa-user-plus text-lg" })),

        // Modals
        showAdd && React.createElement(ModalAdd, { key:'modal-add', onClose:()=>setShowAdd(false), onAdd:handleAdd }),
        archiveMember && React.createElement(ModalArchive, {
            key:'modal-arch', member:archiveMember,
            onClose:()=>setArchiveMember(null),
            onConfirm:handleArchiveConfirm
        }),

        // Toast
        toast && React.createElement(Toast, { key:'toast', msg:toast.msg, type:toast.type })
    ]);
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(React.StrictMode, null, React.createElement(App)));
</script>
</body>
</html>
